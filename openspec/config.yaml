schema: spec-driven

# Project context
context: |
  Project: ccgui (mossx repository) - 多 AI 集成桌面应用
  Product version: package.json.version=0.7.5; src-tauri/tauri.conf.json.version=0.7.5; src-tauri/Cargo.toml.version=0.3.0 is Rust crate metadata
  Tooling baseline: OpenSpec CLI 1.3.1; Trellis CLI/project templates 0.4.0
  Tech stack manifest: @tauri-apps/cli ^2.9.6 + Rust + React 19.2.7 + TypeScript ~5.8.3 + Vite ^7.0.4
  Domain: AI 对话助手、项目记忆管理、多引擎集成（当前注册 Claude Code、Codex CLI、Gemini CLI、OpenCode runtime adapter；OpenCode/Gemini retirement 仍由 active migration 跟踪）
  Architecture:
    - Frontend: React + TypeScript + Tauri IPC
    - Backend: Rust + Tauri Commands + local file persistence
    - Storage: Tauri app-data JSON、~/.ccgui JSON/client stores 与 feature directories；部分 WebView state 使用 localStorage；engine history 保留各 runtime 的 JSONL/SQLite 格式
  OpenSpec workspace:
    - Main specs: openspec/specs/* (403 capabilities)
    - Active changes: 11; index at openspec/changes/README.md
    - Archived changes: 631; index at openspec/changes/archive/README.md
    - Legacy project context remains in openspec/project.md for detailed audit history; this config context is the injected planning context for OpenSpec 1.3.x.
  Conventions:
    - Behavior changes MUST start from an OpenSpec change under openspec/changes/<change-id>/.
    - Trellis tasks MUST reference exactly one OpenSpec change when implementation work is tracked.
    - New capabilities SHOULD use spec-hub-* when they belong to the Spec Hub domain; spec-platform-* is legacy-only.
    - Archive gate requires strict validation, synced main specs, and explicit closure evidence; user-authorized manual QA waivers MUST remain documented with unchecked manual tasks.
    - Use --skip-specs only when main specs were already synced and the equivalence has been verified.
  Quality Gates:
    - openspec validate --all --strict --no-interactive
    - npm run typecheck
    - npm run test or focused Vitest suites for touched frontend behavior
    - cargo test --manifest-path src-tauri/Cargo.toml for Rust/backend behavior

# Per-artifact rules
rules:
  proposal:
    - 必须包含 "目标与边界" 和 "非目标" 章节
    - 技术方案必须对比至少 2 个选项并说明取舍
    - 包含具体的验收标准
  tasks:
    - 每个任务必须可在 2 小时内完成
    - 包含明确的输入/输出和验证方式
    - 标注依赖关系和优先级
  implementation:
    - 先计划后代码 (禁止直接写代码)
    - 先测试后实现 (TDD 驱动)
    - 最小改动原则 (不扩大影响范围)
