name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build_web_assets:
    name: web assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Web assets
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          set -euo pipefail
          npm run build
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(config["version"])
          PY
          )
          python3 - "$VERSION" <<'PY'
          import json
          import sys
          from pathlib import Path

          version = sys.argv[1]
          manifest = {
              "schemaVersion": 1,
              "assetsVersion": version,
              "entrypoint": "index.html",
          }
          Path("dist/manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

          test -f dist/index.html
          test -d dist/assets
          mkdir -p release-artifacts
          ARCHIVE="ccgui-web-assets_${VERSION}.zip"
          (cd dist && zip -q -r "../release-artifacts/${ARCHIVE}" .)
          (cd release-artifacts && sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256")
          unzip -t "release-artifacts/${ARCHIVE}"
          unzip -Z1 "release-artifacts/${ARCHIVE}" > release-artifacts/web-assets-entries.txt
          grep -Fxq "manifest.json" release-artifacts/web-assets-entries.txt
          grep -Fxq "index.html" release-artifacts/web-assets-entries.txt
          grep -Eq '^assets/.+' release-artifacts/web-assets-entries.txt

      - name: Upload Web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: |
            release-artifacts/ccgui-web-assets_*.zip
            release-artifacts/ccgui-web-assets_*.zip.sha256
          if-no-files-found: error

  build_macos:
    name: macos (${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: aarch64
          - platform: macos-15-intel
            arch: x86_64
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.13"
      CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
      NOTARY_PROFILE_NAME: ${{ vars.NOTARY_PROFILE_NAME }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-bin: false
          shared-key: v1-macos-${{ matrix.arch == 'aarch64' && 'arm64' || 'x64' }}-rust
          cache-on-failure: true

      - name: Configure sccache environment
        run: |
          set -euo pipefail
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          CERT_PATH=cert.p12

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            echo "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"

      - name: Configure notarytool credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_B64: ${{ secrets.APPLE_API_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "$APPLE_API_PRIVATE_KEY_B64" | base64 --decode > private_keys/AuthKey.p8
          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --key "private_keys/AuthKey.p8"

      - name: Write Tauri signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          # DO NOT decode - Tauri expects base64-encoded key
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" > "$HOME/.tauri/ccgui.key"

      - name: Build app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          set -euo pipefail
          # TAURI_SIGNING_PRIVATE_KEY expects base64-encoded minisign key
          export TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY_B64"
          npm run tauri -- build --bundles app

      - name: Bundle OpenSSL and re-sign
        run: |
          set -euo pipefail
          CODESIGN_IDENTITY="$CODESIGN_IDENTITY" \
            scripts/macos-fix-openssl.sh

      - name: Notarize and staple
        run: |
          set -euo pipefail
          ditto -c -k --keepParent \
            src-tauri/target/release/bundle/macos/ccgui.app \
            ccgui.zip

          xcrun notarytool submit ccgui.zip \
            --keychain-profile "$NOTARY_PROFILE_NAME" \
            --wait

          xcrun stapler staple \
            src-tauri/target/release/bundle/macos/ccgui.app

      - name: Package artifacts
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mkdir -p release-artifacts

          ditto -c -k --keepParent \
            src-tauri/target/release/bundle/macos/ccgui.app \
            release-artifacts/ccgui.zip

          ARCH="${{ matrix.arch }}"
          bash scripts/create-dmg.sh \
            src-tauri/target/release/bundle/macos/ccgui.app \
            release-artifacts/ccgui_${VERSION}_${ARCH}.dmg

          COPYFILE_DISABLE=1 tar -czf \
            src-tauri/target/release/bundle/macos/ccgui.app.tar.gz \
            -C src-tauri/target/release/bundle/macos ccgui.app

          # Write the base64-encoded key to file (tauri signer expects this format)
          mkdir -p "$HOME/.tauri"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" > "$HOME/.tauri/ccgui.key"

          npm run tauri signer sign -- \
            -f "$HOME/.tauri/ccgui.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            src-tauri/target/release/bundle/macos/ccgui.app.tar.gz

          cp src-tauri/target/release/bundle/macos/ccgui.app.tar.gz \
            release-artifacts/ccgui_${ARCH}.app.tar.gz
          cp src-tauri/target/release/bundle/macos/ccgui.app.tar.gz.sig \
            release-artifacts/ccgui_${ARCH}.app.tar.gz.sig

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release-artifacts/ccgui.zip
            release-artifacts/ccgui_*_${{ matrix.arch }}.dmg
            release-artifacts/ccgui_${{ matrix.arch }}.app.tar.gz
            release-artifacts/ccgui_${{ matrix.arch }}.app.tar.gz.sig

  build_linux:
    name: appimage (x86_64)
    runs-on: ubuntu-24.04
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (linux only)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils libasound2-dev

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-bin: false
          shared-key: v1-linux-x64-rust
          cache-on-failure: true

      - name: Configure sccache environment
        run: |
          set -euo pipefail
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: install frontend dependencies
        run: npm ci

      - name: build AppImage
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          set -euo pipefail
          # TAURI_SIGNING_PRIVATE_KEY expects base64-encoded minisign key
          export TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY_B64"
          npm run tauri -- build --bundles appimage

      - name: prune bundled Wayland libraries from AppImage
        run: |
          set -euo pipefail
          mkdir -p .tools
          curl --fail --show-error --location \
            -o .tools/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .tools/appimagetool
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage artifact found" >&2
            exit 1
          fi
          node scripts/prune-appimage-wayland-libs.mjs \
            --appimage "$APPIMAGE" \
            --appimagetool "$PWD/.tools/appimagetool" \
            --arch x86_64
          rm -f "${APPIMAGE}.sig"

      - name: sign pruned AppImage
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage artifact found" >&2
            exit 1
          fi
          mkdir -p "$HOME/.tauri"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" > "$HOME/.tauri/ccgui.key"
          npm run tauri signer sign -- \
            -f "$HOME/.tauri/ccgui.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$APPIMAGE"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-x86_64
          path: src-tauri/target/release/bundle/appimage/*.AppImage*

  build_windows:
    name: windows (x64)
    runs-on: windows-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-bin: false
          shared-key: v1-win-x64-rust
          cache-on-failure: true

      - name: Configure sccache environment
        shell: pwsh
        run: |
          "RUSTC_WRAPPER=sccache" >> $env:GITHUB_ENV
          "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          "SCCACHE_DIR=$env:LOCALAPPDATA\sccache" >> $env:GITHUB_ENV

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          # TAURI_SIGNING_PRIVATE_KEY expects base64-encoded minisign key
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_SIGNING_PRIVATE_KEY_B64
          npm run tauri -- build --config src-tauri/tauri.windows.conf.json --bundles nsis

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          echo "version=$($conf.version)" >> $env:GITHUB_OUTPUT

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - build_web_assets
      - build_macos
      - build_linux
      - build_windows
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.build_macos.result == 'success' &&
        needs.build_linux.result == 'success' &&
        needs.build_windows.result == 'success'
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: appimage-x86_64
          path: release-artifacts

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-artifacts

      - name: Download Web assets
        if: ${{ needs.build_web_assets.result == 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: release-artifacts

      - name: Build latest.json
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          SIGNATURE_AARCH64=$(cat release-artifacts/ccgui_aarch64.app.tar.gz.sig)
          SIGNATURE_X86_64=$(cat release-artifacts/ccgui_x86_64.app.tar.gz.sig)
          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          output = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              output.append(title)
              output.extend([f"- {item}" for item in items])
              output.append("")

          notes = "\n".join(output).strip()
          if not notes:
              notes = "- No user-facing changes."

          Path("release-artifacts/release-notes.md").write_text(notes + "\n")
          PY

          python3 - <<PY
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          notes = Path("release-artifacts/release-notes.md").read_text().strip()
          artifacts_dir = Path("release-artifacts")

          platforms = {
            "darwin-aarch64": {
              "url": "https://github.com/zhukunpenglinyutong/desktop-cc-gui/releases/download/v${VERSION}/ccgui_aarch64.app.tar.gz",
              "signature": "${SIGNATURE_AARCH64}",
            },
            "darwin-x86_64": {
              "url": "https://github.com/zhukunpenglinyutong/desktop-cc-gui/releases/download/v${VERSION}/ccgui_x86_64.app.tar.gz",
              "signature": "${SIGNATURE_X86_64}",
            }
          }

          # Find Linux AppImages
          appimages = list(artifacts_dir.rglob("*.AppImage.tar.gz"))
          if not appimages:
            appimages = list(artifacts_dir.rglob("*.AppImage"))

          def detect_arch(name):
            lowered = name.lower()
            if "aarch64" in lowered or "arm64" in lowered:
              return "aarch64"
            if "x86_64" in lowered or "amd64" in lowered:
              return "x86_64"
            return None

          for appimage in appimages:
            arch = detect_arch(appimage.name)
            if not arch:
              continue
            sig_path = appimage.with_suffix(appimage.suffix + ".sig")
            if sig_path.exists():
              platforms[f"linux-{arch}"] = {
                "url": f"https://github.com/zhukunpenglinyutong/desktop-cc-gui/releases/download/v${VERSION}/{appimage.name}",
                "signature": sig_path.read_text().strip(),
              }

          # Find Windows NSIS installer (Tauri 2 generates .exe + .exe.sig)
          nsis_exes = [f for f in artifacts_dir.rglob("*-setup.exe") if not f.name.endswith(".sig")]
          for nsis_exe in nsis_exes:
            sig_path = Path(str(nsis_exe) + ".sig")
            if sig_path.exists():
              platforms["windows-x86_64"] = {
                "url": f"https://github.com/zhukunpenglinyutong/desktop-cc-gui/releases/download/v${VERSION}/{nsis_exe.name}",
                "signature": sig_path.read_text().strip(),
              }
              break

          payload = {
            "version": "${VERSION}",
            "notes": notes,
            "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "platforms": platforms,
          }

          Path("release-artifacts/latest.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          ASSETS=()
          for pattern in \
            "release-artifacts/ccgui.zip" \
            "release-artifacts/ccgui_*_aarch64.dmg" \
            "release-artifacts/ccgui_*_x86_64.dmg" \
            "release-artifacts/ccgui_aarch64.app.tar.gz" \
            "release-artifacts/ccgui_aarch64.app.tar.gz.sig" \
            "release-artifacts/ccgui_x86_64.app.tar.gz" \
            "release-artifacts/ccgui_x86_64.app.tar.gz.sig" \
            "release-artifacts/*.AppImage*" \
            "release-artifacts/*-setup.exe" \
            "release-artifacts/*-setup.exe.sig" \
            "release-artifacts/ccgui-web-assets_*.zip" \
            "release-artifacts/ccgui-web-assets_*.zip.sha256" \
            "release-artifacts/latest.json"
          do
            for f in $pattern; do
              [ -e "$f" ] && ASSETS+=("$f")
            done
          done

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$GITHUB_SHA" \
            "${ASSETS[@]}"

      - name: Bump version and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          NEXT_VERSION=$(python3 - <<'PY' "$VERSION"
          import sys

          version = sys.argv[1]
          parts = version.split(".")
          if len(parts) != 3:
              raise SystemExit("Expected version like 0.X.Y")

          major, minor, patch = (int(p) for p in parts)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version "$NEXT_VERSION" --no-git-tag-version

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$NEXT_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          git checkout -b "chore/bump-version-${NEXT_VERSION}"
          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${NEXT_VERSION}"
          git push origin "chore/bump-version-${NEXT_VERSION}"

          gh pr create \
            --title "chore: bump version to ${NEXT_VERSION}" \
            --body "Post-release version bump to ${NEXT_VERSION}." \
            --base main \
            --head "chore/bump-version-${NEXT_VERSION}"
